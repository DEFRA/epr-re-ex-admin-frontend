name: Check Pull Request

on:
  pull_request:
    branches:
      - "*"
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  pr-prep:
    name: Preparation
    runs-on: ubuntu-latest
    steps:
      - name: Prepare PR
        uses: DEFRA/epr-re-ex-service/.github/actions/pr-preparation@main



  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Test and Scan
        uses: ./.github/actions/test-and-scan
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}

  type-check-tests:
    name: Lint Types - Tests (advisory)
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@11.12.1

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint types (tests)
        run: |
          # disable setup-node's tsc problem matcher: we summarise below
          # rather than wanting per-line pr annotations on every error
          echo "::remove-matcher owner=tsc::"

          OUTPUT=$(npm run lint:types:tests 2>&1) && STATUS=0 || STATUS=$?
          echo "$OUTPUT"

          if [ "$STATUS" -eq 0 ]; then
            cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Lint Types - Tests

          :white_check_mark: Test type check passed
          EOF
          else
            ERRORS=$(echo "$OUTPUT" | grep -c "^src/" || true)
            TOP_CODES=$(echo "$OUTPUT" | grep -oE 'TS[0-9]+' | sort | uniq -c | sort -rn | head -10)
            TS_LIB=node_modules/typescript/lib/typescript.js
            BY_CODE_TABLE=$(
              printf '| Count | Code | Description |\n'
              printf '| ---: | --- | --- |\n'
              while read -r count code; do
                [ -z "$code" ] && continue
                num=${code#TS}
                desc=$(grep -oE "diag\\($num, [0-9]+[^,]*, \"[^\"]+\", \"[^\"]+\"\\)" "$TS_LIB" 2>/dev/null | head -1 | sed -E 's/^.*", "([^"]+)"\)$/\1/')
                if [ -z "$desc" ]; then
                  desc=$(echo "$OUTPUT" | grep -m1 -E "error $code:" | sed -E "s/^.*error $code: //")
                fi
                desc=$(echo "$desc" | sed -E 's/[|]/\\|/g')
                slug=$(echo "$code" | tr '[:upper:]' '[:lower:]')
                printf '| %s | [%s](https://typescript.tv/errors/%s/) | %s |\n' "$count" "$code" "$slug" "$desc"
              done <<< "$TOP_CODES"
            )
            BY_FILE=$(echo "$OUTPUT" | grep "^src/" | sed 's/(.*/:/' | sort | uniq -c | sort -rn)
            FULL=$(echo "$OUTPUT" | grep "^src/")
            cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Lint Types - Tests

          :warning: **${ERRORS} type errors found in tests** (advisory — not blocking)

          ### Top error codes

          ${BY_CODE_TABLE}

          <details><summary>Errors by file (count)</summary>

          \`\`\`
          ${BY_FILE}
          \`\`\`

          </details>

          <details><summary>Full error list</summary>

          \`\`\`
          ${FULL}
          \`\`\`

          </details>
          EOF
          fi

  test-journey:
    name: Run Journey Tests
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - uses: actions/checkout@v6

      - name: Check for matching journey test branch
        id: journey-branch
        run: |
          BRANCH="${{ github.head_ref }}"
          if git ls-remote --heads https://github.com/DEFRA/epr-re-ex-admin-frontend-tests.git "$BRANCH" | grep -q .; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Record build start time
        id: build-timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - run: docker build -t defradigital/epr-re-ex-admin-frontend:${{github.sha}} .

      - name: Record test start time
        id: test-timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Run journey tests on ${{ steps.journey-branch.outputs.ref }}
        uses: DEFRA/epr-re-ex-admin-frontend-tests/run-journey-tests@main
        with:
          epr-re-ex-admin-frontend: ${{github.sha}}
          branch: ${{ steps.journey-branch.outputs.ref }}

      - name: Write journey test summary
        if: always()
        run: |
          {
            if compgen -G "allure-results/*-result.json" > /dev/null; then
              DOCKER_SECS=$(( ${{ steps.test-timer.outputs.start }} - ${{ steps.build-timer.outputs.start }} ))
              TEST_SECS=$(( $(date +%s) - ${{ steps.test-timer.outputs.start }} ))

              fmt_secs() {
                if [ "$1" -ge 60 ]; then echo "$(( $1 / 60 ))m $(( $1 % 60 ))s"
                else echo "${1}s"
                fi
              }

              DOCKER_DUR=$(fmt_secs $DOCKER_SECS)
              TEST_DUR=$(fmt_secs $TEST_SECS)

              IFS=$'\t' read -r PASSED FAILED TOTAL < <(jq -sr '
                [
                  (map(select(.status == "passed")) | length),
                  (map(select(.status == "failed" or .status == "broken")) | length),
                  length
                ] | @tsv
              ' allure-results/*-result.json)

              SLOW_JOURNEY=$(jq -sr '
                def fmt_secs:
                  if . >= 60 then "\(. / 60 | floor)m \(. % 60)s"
                  else "\(.)s"
                  end;
                map(select(.start != null and .stop != null))
                | sort_by(-.stop + .start) | .[0:5][]
                | ((.stop - .start) / 1000 | round) as $secs
                | "| \(.name) | \($secs | fmt_secs) |"
              ' allure-results/*-result.json)

              cat <<EOF
          ## Journey Tests

          | | Passed | Failed | Total |
          |---|---|---|---|
          | Tests | $PASSED | $FAILED | $TOTAL |

          Docker build: $DOCKER_DUR | Tests: $TEST_DUR

          ### Slowest Journey Tests

          | Test | Duration |
          |---|---|
          $SLOW_JOURNEY
          EOF
            fi
          } >> "$GITHUB_STEP_SUMMARY"
