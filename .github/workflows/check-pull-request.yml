name: Check Pull Request

on:
  pull_request:
    branches:
      - '*'
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  pr-prep:
    name: Preparation
    runs-on: ubuntu-latest
    steps:
      - name: Prepare PR
        uses: DEFRA/epr-re-ex-service/.github/actions/pr-preparation@main

  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Test and Scan
        uses: DEFRA/epr-re-ex-service/.github/actions/test-and-scan@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          build-command: npm run build:frontend

  type-check-prod:
    name: Lint Types - Prod
    runs-on: ubuntu-latest
    needs: pr-prep
    permissions:
      contents: read
      pull-requests: write
    steps:
      # temporary: pin to branch for preview until on main, then revert to @main
      - uses: DEFRA/epr-re-ex-service/.github/actions/lint-types@PAE-000-strict-soft-ratchet
        with:
          npm-script: lint:types
          tsconfig: jsconfig.typecheck.json
          label: Prod
          comment-header: lint-types-prod
          fail-on: all

  type-check-tests:
    name: Lint Types - Tests
    runs-on: ubuntu-latest
    needs: pr-prep
    permissions:
      contents: read
      pull-requests: write
    steps:
      # temporary: pin to branch for preview until on main, then revert to @main
      - uses: DEFRA/epr-re-ex-service/.github/actions/lint-types@PAE-000-strict-soft-ratchet
        with:
          fail-on: all

  typecheck-burndown:
    name: Typecheck strictness burndown
    runs-on: ubuntu-latest
    needs: pr-prep
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      # temporary: pin to branch until typecheck-burndown is on main, then revert to @main
      - uses: DEFRA/epr-re-ex-service/.github/actions/typecheck-burndown@PAE-000-strict-soft-ratchet

  test-journey:
    name: Run Journey Tests
    runs-on: ubuntu-latest
    needs: pr-prep
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check for matching journey test branch
        id: journey-branch
        run: |
          BRANCH="${{ github.head_ref }}"
          if git ls-remote --heads https://github.com/DEFRA/epr-re-ex-admin-frontend-tests.git "$BRANCH" | grep -q .; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Record build start time
        id: build-timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - run: docker build -t defradigital/epr-re-ex-admin-frontend:${{github.sha}} .

      - name: Record test start time
        id: test-timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Run journey tests on ${{ steps.journey-branch.outputs.ref }}
        uses: DEFRA/epr-re-ex-admin-frontend-tests/run-journey-tests@main
        with:
          epr-re-ex-admin-frontend: ${{github.sha}}
          branch: ${{ steps.journey-branch.outputs.ref }}

      - name: Write journey test summary
        if: always()
        uses: DEFRA/epr-re-ex-service/.github/actions/journey-test-summary@main
        with:
          build-start: ${{ steps.build-timer.outputs.start }}
          test-start: ${{ steps.test-timer.outputs.start }}
