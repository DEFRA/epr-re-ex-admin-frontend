name: Publish

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency:
  group: publish

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: "094954420758"

jobs:
  build:
    if: github.run_number != 1
    name: CDP-build-workflow
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Depth 0 is required for branch-based versioning

      - name: Test and Scan
        # TEMP (2026-07-16): non-blocking while SonarCloud is down (api.sonarcloud.io
        # 504s during JRE provisioning fail the scan step inside this composite).
        # Tests already gate via check-pull-request before merge. Revert once
        # SonarCloud recovers or DEFRA/epr-re-ex-service#361 is merged.
        continue-on-error: true
        uses: DEFRA/epr-re-ex-service/.github/actions/test-and-scan@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          build-command: npm run build:frontend

      - name: Build and Publish
        uses: DEFRA/cdp-build-action/build@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
